<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="topbar(active)" class="sticky top-0 z-50 border-b border-[#E2E8F0] bg-white/95 backdrop-blur">
    <div class="max-w-7xl mx-auto px-6 lg:px-10 h-16 flex items-center justify-between gap-6">
        <a th:href="@{/}" class="flex items-center gap-3 min-w-0">
            <span class="w-9 h-9 rounded-xl bg-[#2F5A42] text-white flex items-center justify-center shadow-sm">
                <i class="fa-solid fa-network-wired text-sm"></i>
            </span>
            <span class="text-xl font-black tracking-tight text-[#2F5A42]">mycellium</span>
        </a>

        <nav class="hidden md:flex items-center gap-1 text-sm font-semibold">
            <a th:href="@{/}" th:class="${'px-4 py-2 rounded-full transition-colors ' + (active == 'events' ? 'text-[#2F5A42] bg-[#EAF2ED]' : 'text-[#718096] hover:text-[#2F5A42] hover:bg-[#F7FAFC]')}">Events</a>
            <a th:if="${session.loggedInUser != null && session.loggedInUser.role == 'STUDENT'}" th:href="@{/student/dashboard}" th:class="${'px-4 py-2 rounded-full transition-colors ' + (active == 'student' ? 'text-[#2F5A42] bg-[#EAF2ED]' : 'text-[#718096] hover:text-[#2F5A42] hover:bg-[#F7FAFC]')}">My Events</a>
            <a th:if="${session.loggedInUser != null && session.loggedInUser.role == 'ORGANIZER'}" th:href="@{/organizer/dashboard}" th:class="${'px-4 py-2 rounded-full transition-colors ' + (active == 'organizer' ? 'text-[#2F5A42] bg-[#EAF2ED]' : 'text-[#718096] hover:text-[#2F5A42] hover:bg-[#F7FAFC]')}">Organizer Studio</a>
        </nav>

        <div class="flex items-center gap-3">
            <div th:if="${session.loggedInUser == null}" class="flex items-center gap-2">
                <a th:href="@{/auth/login}" th:class="${'text-sm font-bold px-4 py-2 rounded-full border transition-colors ' + (active == 'login' ? 'text-[#2F5A42] border-[#2F5A42] bg-[#EAF2ED]' : 'text-[#2D3748] border-[#E2E8F0] hover:border-[#2F5A42]')}">Sign in</a>
                <a th:href="@{/auth/register}" class="hidden sm:inline-flex bg-[#2F5A42] hover:bg-[#234331] text-white text-sm font-bold px-4 py-2 rounded-full shadow-sm transition-colors">Join</a>
            </div>

            <details th:if="${session.loggedInUser != null && session.loggedInUser.role == 'STUDENT'}" class="relative">
                <summary class="list-none cursor-pointer h-10 w-10 rounded-full border border-[#E2E8F0] bg-white text-[#2F5A42] flex items-center justify-center hover:bg-[#F7FAFC]">
                    <i class="fa-solid fa-bell text-sm"></i>
                    <span th:if="${unreadNotificationsCount != null && unreadNotificationsCount > 0}" class="absolute -top-1 -right-1 text-[10px] bg-[#FF5A50] text-white rounded-full px-1.5 py-0.5" th:text="${unreadNotificationsCount}">0</span>
                </summary>
                <div class="absolute right-0 mt-3 w-80 bg-white border border-[#E2E8F0] rounded-2xl shadow-xl overflow-hidden z-50">
                    <div class="px-4 py-3 border-b border-[#E2E8F0] bg-[#F7FAFC] flex items-center justify-between">
                        <span class="text-xs font-black text-[#2D3748] uppercase tracking-wider">Notifications</span>
                        <form th:action="@{/student/notifications/read-all}" method="POST">
                            <button type="submit" class="text-[11px] font-bold text-[#2F5A42] hover:underline">Mark all read</button>
                        </form>
                    </div>
                    <div th:if="${#lists.isEmpty(recentNotifications)}" class="p-4 text-xs text-[#718096]">No notifications yet.</div>
                    <div th:each="notification : ${recentNotifications}" class="p-4 border-b border-[#F1F5F9]">
                        <p class="text-xs font-bold text-[#2D3748]" th:text="${notification.title}">Notification</p>
                        <p class="text-[11px] text-[#718096] mt-1" th:text="${notification.message}">Message</p>
                        <form th:action="@{'/student/notifications/' + ${notification.id} + '/read'}" method="POST" class="mt-2">
                            <button type="submit" class="text-[11px] font-bold text-[#2F5A42] hover:underline">Open</button>
                        </form>
                    </div>
                </div>
            </details>

            <div th:if="${session.loggedInUser != null}" class="hidden sm:flex flex-col items-end leading-tight">
                <span class="text-xs text-[#718096]">Signed in as</span>
                <span class="text-sm font-bold text-[#2D3748] max-w-[160px] truncate" th:text="${session.loggedInUser.name}">User</span>
            </div>
            <a th:if="${session.loggedInUser != null}" th:href="@{/auth/logout}" class="text-sm font-bold text-[#FF5A50] hover:underline">Sign out</a>
        </div>
    </div>
</header>

<div th:fragment="alerts" class="space-y-3">
    <div th:if="${message}" class="bg-[#F3F7F5] border border-[#D1E7DD] px-4 py-3 rounded-2xl text-sm text-[#2F5A42] flex items-center gap-2">
        <i class="fa-solid fa-circle-check flex-shrink-0"></i>
        <span th:text="${message}">Action completed.</span>
    </div>
    <div th:if="${error}" class="bg-red-50 border border-red-100 px-4 py-3 rounded-2xl text-sm text-red-700 flex items-center gap-2">
        <i class="fa-solid fa-circle-exclamation flex-shrink-0"></i>
        <span th:text="${error}">Something went wrong.</span>
    </div>
</div>
</body>
</html>
