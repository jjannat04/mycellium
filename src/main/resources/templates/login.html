<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Mycellium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { font-family: 'Roboto', sans-serif; }</style>
</head>
<body class="min-h-screen bg-[#FAFAFA] text-[#2D3748] font-sans antialiased">

<div th:replace="~{fragments :: topbar('login')}"></div>

<main class="max-w-7xl mx-auto px-6 lg:px-10 py-10">
    <section class="grid grid-cols-1 lg:grid-cols-[1fr_460px] gap-8 items-stretch">
        <div class="bg-[#2F5A42] rounded-[2rem] p-8 lg:p-12 text-white min-h-[520px] flex flex-col justify-between relative overflow-hidden">
            <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_right,rgba(255,255,255,0.18),transparent_35%)]"></div>
            <div class="relative space-y-5">
                <span class="inline-flex text-xs font-black uppercase tracking-wider text-white/75 border border-white/20 px-3 py-1 rounded-full">Welcome back</span>
                <h1 class="text-4xl lg:text-6xl font-black tracking-tight leading-tight">Return to your campus event desk.</h1>
                <p class="text-sm lg:text-base text-white/80 max-w-xl leading-relaxed">Sign in to register for segments, manage events, and follow what is happening across campus.</p>
            </div>
            <div class="relative grid grid-cols-1 sm:grid-cols-3 gap-3 text-sm">
                <div class="border border-white/15 bg-white/10 rounded-2xl p-4">Discover events</div>
                <div class="border border-white/15 bg-white/10 rounded-2xl p-4">Track passes</div>
                <div class="border border-white/15 bg-white/10 rounded-2xl p-4">Publish stories</div>
            </div>
        </div>

        <div class="bg-white border border-[#E2E8F0] rounded-[2rem] p-8 lg:p-10 shadow-sm flex flex-col justify-center">
            <div class="space-y-6">
                <div>
                    <p class="text-xs font-black uppercase tracking-wider text-[#FF5A50]">Account</p>
                    <h2 class="text-3xl font-black text-[#2D3748] mt-2">Sign in</h2>
                    <p class="text-sm text-[#718096] mt-2">Use your Mycellium credentials.</p>
                </div>

                <div th:if="${error}" class="bg-red-50 border border-red-100 p-4 rounded-2xl text-sm text-red-700 flex items-center gap-2">
                    <i class="fa-solid fa-circle-exclamation flex-shrink-0"></i>
                    <span th:text="${error}">Invalid email or password.</span>
                </div>

                <form th:action="@{/auth/login}" method="POST" class="space-y-4">
                    <label class="block space-y-2">
                        <span class="text-xs font-black text-[#4A5568] uppercase tracking-wider">Email</span>
                        <span class="relative block">
                            <i class="fa-regular fa-envelope absolute left-4 top-3.5 text-[#A0AEC0] text-sm"></i>
                            <input type="email" name="email" required placeholder="you@university.edu" class="w-full bg-[#F7FAFC] border border-[#E2E8F0] rounded-2xl py-3 pl-11 pr-4 text-sm focus:outline-none focus:border-[#2F5A42]">
                        </span>
                    </label>
                    <label class="block space-y-2">
                        <span class="text-xs font-black text-[#4A5568] uppercase tracking-wider">Password</span>
                        <span class="relative block">
                            <i class="fa-solid fa-lock absolute left-4 top-3.5 text-[#A0AEC0] text-sm"></i>
                            <input type="password" name="password" required placeholder="Password" class="w-full bg-[#F7FAFC] border border-[#E2E8F0] rounded-2xl py-3 pl-11 pr-4 text-sm focus:outline-none focus:border-[#2F5A42]">
                        </span>
                    </label>
                    <button type="submit" class="w-full bg-[#2F5A42] hover:bg-[#234331] text-white text-sm font-black py-3 rounded-2xl shadow-sm">Sign in</button>
                </form>

                <p class="text-sm text-center text-[#718096] pt-4 border-t border-[#F1F5F9]">
                    New here? <a th:href="@{/auth/register}" class="text-[#FF5A50] font-black hover:underline">Create an account</a>
                </p>
            </div>
        </div>
    </section>
</main>
</body>
</html>
